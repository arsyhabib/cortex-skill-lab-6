<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, Arial, sans-serif" role="img">
  <title>Infiltrasi Lidokain Fan Pattern</title>
  <desc>Diagram pelatihan infiltrasi anestesi lokal pola kipas sepanjang tepi robekan perineum.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/></marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/></marker>
    <marker id="arrowWarn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
    <linearGradient id="violetCyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0f2fe"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="softRed" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fee2e2"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>
    
  </defs>

  <style>
    .title{font-size:28px;font-weight:800;fill:#1a1a2e}
    .subtitle{font-size:15px;fill:#475569;font-weight:500}
    .label{font-size:16px;fill:#1a1a2e;font-weight:700}
    .small{font-size:12.5px;fill:#475569;font-weight:600}
    .tiny{font-size:11px;fill:#475569}
    .card{fill:#f8fafc;stroke:#e2e8f0;stroke-width:2;rx:18}
    .panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:16}
    .line{stroke:#1a1a2e;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#475569;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .arrow{stroke:#3b82f6;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
    .arrowCyan{stroke:#06b6d4;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowCyan)}
    .arrowWarn{stroke:#f59e0b;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowWarn)}
    .arrowRed{stroke:#ef4444;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowRed)}
  </style>

  <rect x="70" y="12" width="760" height="66" rx="20" fill="#ffffff" opacity="0.94" stroke="#e2e8f0" stroke-width="2"/>

  <text x="450" y="40" class="title" text-anchor="middle">Infiltrasi Lidokain: Fan Pattern</text>
  <text x="450" y="66" class="subtitle" text-anchor="middle">Infiltrasi anestesi lokal sepanjang tepi robekan; aspirasi sebelum menyuntik</text>
  <g transform="translate(70 98)">
    <rect x="0" y="0" width="760" height="430" rx="20" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <ellipse cx="390" cy="260" rx="195" ry="96" fill="#fce7f3" stroke="#be185d" stroke-width="3"/>
    <path d="M390 172 C365 220 362 291 390 348" stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M380 180 C335 220 323 294 374 340" stroke="#fca5a5" stroke-width="3" fill="none" stroke-dasharray="8 6"/>
    <path d="M402 180 C447 220 459 294 408 340" stroke="#fca5a5" stroke-width="3" fill="none" stroke-dasharray="8 6"/>
    <g stroke="#06b6d4" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowCyan)">
      <path d="M236 160 C285 188 330 218 374 252"/>
      <path d="M230 190 C288 210 332 239 382 273"/>
      <path d="M230 220 C292 230 340 258 388 295"/>
      <path d="M230 250 C296 252 344 279 394 319"/>
    </g>
    <rect x="95" y="112" width="125" height="28" rx="14" fill="#e2e8f0" stroke="#475569" stroke-width="2" transform="rotate(20 95 112)"/>
    <rect x="55" y="97" width="70" height="42" rx="8" fill="#ffffff" stroke="#475569" stroke-width="2" transform="rotate(20 55 97)"/>
    <line x1="213" y1="151" x2="235" y2="160" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <text x="118" y="75" class="label" text-anchor="middle">Spuit</text>
    <path d="M118 84 L150 125" class="arrow"/>
    <rect x="510" y="105" width="210" height="108" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="615" y="137" class="label" style="fill:#b45309" text-anchor="middle">Wajib aspirasi</text>
    <text x="615" y="163" class="small" text-anchor="middle">Tarik plunger dulu</text>
    <text x="615" y="187" class="small" style="fill:#ef4444" text-anchor="middle">Tidak ada darah kembali</text>
    <rect x="205" y="365" width="370" height="42" rx="21" fill="#e0f2fe" stroke="#06b6d4" stroke-width="2"/>
    <text x="390" y="392" class="label" style="fill:#0e7490" text-anchor="middle">Arah suntikan menyebar seperti kipas di tepi robekan</text>
  </g>

</svg>
