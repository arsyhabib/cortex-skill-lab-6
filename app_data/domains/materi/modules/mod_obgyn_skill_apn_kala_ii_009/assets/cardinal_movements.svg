    <path d="M80 85 C105 58 145 58 168 85 C190 112 180 150 148 166 C122 182 92 169 78 138 C70 115 70 97 80 85Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.3" transform="translate(-7.5 0) scale(0.72) translate(35 58)"/>
    <circle cx="95.0" cy="132" r="5" fill="#8b5cf6"/>
  </g>
  <g transform="translate(465 95)">
    <rect x="0" y="0" width="190" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="95.0" y="25" class="label" text-anchor="middle">3. Flexion</text>
    <text x="95.0" y="47" class="small" text-anchor="middle">Fleksi</text>
    <path d="M36 70 C58 47 145 47 168 70 C150 88 142 131 158 156 C128 170 76 168 47 156 C62 130 54 88 36 70Z" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <path d="M84 92 C112 60 153 70 171 102 C187 132 170 165 138 174 C113 181 85 164 78 135 C74 118 75 104 84 92Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.3" transform="translate(-7.5 0) scale(0.72) translate(35 58)"/>
    <circle cx="95.0" cy="132" r="5" fill="#8b5cf6"/>
  </g>
  <g transform="translate(685 95)">
    <rect x="0" y="0" width="190" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="95.0" y="25" class="label" text-anchor="middle">4. Internal rotation</text>
    <text x="95.0" y="47" class="small" text-anchor="middle">Rotasi internal</text>
    <path d="M36 70 C58 47 145 47 168 70 C150 88 142 131 158 156 C128 170 76 168 47 156 C62 130 54 88 36 70Z" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <path d="M92 86 C124 60 166 78 174 116 C180 150 152 174 118 169 C90 164 72 136 82 108 C84 100 87 92 92 86Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.3" transform="translate(-7.5 0) scale(0.72) translate(35 58)"/>
    <circle cx="95.0" cy="132" r="5" fill="#8b5cf6"/>
  </g>
  <g transform="translate(575 325)">
    <rect x="0" y="0" width="190" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="95.0" y="25" class="label" text-anchor="middle">5. Extension</text>
    <text x="95.0" y="47" class="small" text-anchor="middle">Ekstensi</text>
    <path d="M36 70 C58 47 145 47 168 70 C150 88 142 131 158 156 C128 170 76 168 47 156 C62 130 54 88 36 70Z" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <path d="M91 118 C108 78 151 70 176 97 C203 127 190 170 155 185 C124 199 88 184 78 148 C75 138 77 126 91 118Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.3" transform="translate(-7.5 0) scale(0.72) translate(35 58)"/>
    <circle cx="95.0" cy="132" r="5" fill="#8b5cf6"/>
  </g>
  <g transform="translate(355 325)">
    <rect x="0" y="0" width="190" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="95.0" y="25" class="label" text-anchor="middle">6. External rotation</text>
    <text x="95.0" y="47" class="small" text-anchor="middle">Restitusi</text>
    <path d="M36 70 C58 47 145 47 168 70 C150 88 142 131 158 156 C128 170 76 168 47 156 C62 130 54 88 36 70Z" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <path d="M81 92 C106 62 148 62 171 92 C193 121 182 160 148 176 C118 190 86 172 77 138 C73 119 72 104 81 92Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.3" transform="translate(-7.5 0) scale(0.72) translate(35 58)"/>
    <circle cx="95.0" cy="132" r="5" fill="#8b5cf6"/>
  </g>
  <g transform="translate(135 325)">
    <rect x="0" y="0" width="190" height="190" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="95.0" y="25" class="label" text-anchor="middle">7. Expulsion</text>
    <text x="95.0" y="47" class="small" text-anchor="middle">Bayi lahir</text>
    <path d="M36 70 C58 47 145 47 168 70 C150 88 142 131 158 156 C128 170 76 168 47 156 C62 130 54 88 36 70Z" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <path d="M86 90 C114 50 166 62 185 104 C202 142 177 184 136 188 C100 191 72 160 75 126 C76 112 80 100 86 90Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.3" transform="translate(-7.5 0) scale(0.72) translate(35 58)"/>
    <circle cx="95.0" cy="132" r="5" fill="#8b5cf6"/>
  </g>

  <path d="M215 190 L240 190" class="arrowCyan"/><path d="M435 190 L460 190" class="arrowCyan"/><path d="M655 190 L680 190" class="arrowCyan"/>
  <path d="M780 286 C780 315 705 316 670 324" class="arrowCyan"/>
  <path d="M575 420 L550 420" class="arrowCyan"/><path d="M355 420 L330 420" class="arrowCyan"/>
  <text x="450" y="572" class="small" text-anchor="middle">Ekstensi: kepala lahir di bawah simfisis → Restitusi → Ekspulsi: bahu anterior, bahu posterior, lalu badan</text>

</svg>
