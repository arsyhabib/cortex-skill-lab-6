<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, Arial, sans-serif" role="img">
  <title>Spekulum Arah Masuk dan Rotasi</title>
  <desc>Diagram langkah memasukkan spekulum dengan arah oblique posterior, rotasi horizontal, dan membuka blade.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/></marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/></marker>
    <marker id="arrowWarn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
    <linearGradient id="violetCyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0f2fe"/><stop offset="100%" stop-color="#f8fafc"/></linearGradient>
    <linearGradient id="softRed" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fee2e2"/><stop offset="100%" stop-color="#fff7ed"/></linearGradient>
    
  </defs>

  <style>
    .title{font-size:28px;font-weight:800;fill:#1a1a2e}
    .subtitle{font-size:15px;fill:#475569;font-weight:500}
    .label{font-size:16px;fill:#1a1a2e;font-weight:700}
    .small{font-size:12.5px;fill:#475569;font-weight:600}
    .tiny{font-size:11px;fill:#475569}
    .card{fill:#f8fafc;stroke:#e2e8f0;stroke-width:2;rx:18}
    .panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:16}
    .line{stroke:#1a1a2e;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .thin{stroke:#475569;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .arrow{stroke:#3b82f6;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
    .arrowCyan{stroke:#06b6d4;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowCyan)}
    .arrowWarn{stroke:#f59e0b;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowWarn)}
    .arrowRed{stroke:#ef4444;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowRed)}
  </style>

  <rect x="70" y="12" width="760" height="66" rx="20" fill="#ffffff" opacity="0.94" stroke="#e2e8f0" stroke-width="2"/>

  <text x="450" y="38" class="title" text-anchor="middle">Spekulum: Arah Masuk dan Rotasi</text>
  <text x="450" y="64" class="subtitle" text-anchor="middle">Teknik oblique-posterior: masuk miring ke posterior, rotasi horizontal, buka blade perlahan</text>
  <g transform="translate(40 105)">
    <rect x="0" y="0" width="245" height="385" rx="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="122" y="34" class="label" text-anchor="middle">1. Arah masuk</text>
    <text x="122" y="58" class="small" text-anchor="middle">Oblique ke posterior</text>
    <path d="M62 138 C98 92 182 92 218 138 C182 185 98 185 62 138Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.5"/>
    <path d="M93 138 C112 115 168 115 188 138 C168 164 112 164 93 138Z" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
    <circle cx="140" cy="138" r="17" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <path d="M35 210 L210 125" class="arrowCyan"/>
    <rect x="30" y="202" width="160" height="20" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" transform="rotate(-28 30 202)"/>
    <text x="122" y="315" class="small" text-anchor="middle">Hindari tekanan anterior</text>
  </g>
  <g transform="translate(327 105)">
    <rect x="0" y="0" width="245" height="385" rx="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="122" y="34" class="label" text-anchor="middle">2. Rotasi</text>
    <text x="122" y="58" class="small" text-anchor="middle">Putar menjadi horizontal</text>
    <path d="M62 138 C98 92 182 92 218 138 C182 185 98 185 62 138Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.5"/>
    <path d="M93 138 C112 115 168 115 188 138 C168 164 112 164 93 138Z" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
    <circle cx="140" cy="138" r="17" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <path d="M110 72 C180 52 228 92 218 150" class="arrowWarn"/>
    <rect x="70" y="202" width="150" height="20" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" transform="rotate(0 70 202)"/>
    <text x="122" y="315" class="small" text-anchor="middle">Rotasi setelah masuk cukup dalam</text>
  </g>
  <g transform="translate(614 105)">
    <rect x="0" y="0" width="245" height="385" rx="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="122" y="34" class="label" text-anchor="middle">3. Buka blade</text>
    <text x="122" y="58" class="small" text-anchor="middle">Buka perlahan, visualisasi serviks</text>
    <path d="M62 138 C98 92 182 92 218 138 C182 185 98 185 62 138Z" fill="#fee2e2" stroke="#991b1b" stroke-width="2.5"/>
    <path d="M93 138 C112 115 168 115 188 138 C168 164 112 164 93 138Z" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
    <circle cx="140" cy="138" r="17" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <path d="M94 128 L210 100" stroke="#06b6d4" stroke-width="4" fill="none" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
    <path d="M94 150 L210 180" stroke="#06b6d4" stroke-width="4" fill="none" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
    <path d="M62 220 L190 195" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
    <path d="M62 220 L190 246" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
    <text x="122" y="315" class="small" text-anchor="middle">Buka bertahap sambil melihat serviks</text>
  </g>

  <g transform="translate(250 530)"><rect x="0" y="0" width="400" height="42" rx="21" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="27" class="label" style="fill:#166534" text-anchor="middle">Prinsip: lembut, terarah, dan tidak memaksa</text></g>

</svg>
