  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow: hidden;
      background: var(--cortex-theme-bg, #060818);
      transition: background-color 300ms ease;
    }

    #root {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: var(--cortex-theme-bg, #060818);
      transition: background-color 300ms ease;
    }

    body {
      background: var(--cortex-theme-bg, #060818);
      font-family: "SF Pro Display", "Inter", -apple-system, sans-serif;
    }

    /* CORTEX EDUCATION — Master Stylesheet */
    /* Glass Effects, Animations, Backgrounds */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cortex-tilt-x: 0;
      --cortex-tilt-y: 0;
      --cortex-depth-x: 0px;
      --cortex-depth-y: 0px;
      --cortex-wallpaper-shift-x: 0px;
      --cortex-wallpaper-shift-y: 0px;
      --cortex-card-tilt-x: 0deg;
      --cortex-card-tilt-y: 0deg;
      --cortex-card-shift-x: 0px;
      --cortex-card-shift-y: 0px;
      --cortex-button-tilt-x: 0deg;
      --cortex-button-tilt-y: 0deg;
      --cortex-button-shift-x: 0px;
      --cortex-button-shift-y: 0px;
      --cortex-motion-scale: 1;
      --cortex-shake-scale: 1;
      --cortex-shake-force: 0;
      --cortex-shake-x: 0px;
      --cortex-shake-y: 0px;
      --cortex-shake-x-neg: 0px;
      --cortex-shake-y-pos: 0px;
      --cortex-shake-rot: 0deg;
      --cortex-shake-rot-neg: 0deg;
      --cortex-shake-rest: 0deg;
      --cortex-touch-shift-x: 0px;
      --cortex-touch-shift-y: 0px;
      --cortex-touch-sheen-x: 0px;
      --cortex-touch-sheen-y: 0px;
      --cortex-touch-sheen-angle: 0deg;
      --cortex-touch-squash: 0;
      --cortex-touch-scale: 0;
      --cortex-touch-press: 0;
      --cortex-text-zoom: 1;
    }

    /* ═══════════════════════════════════════════
   KEYFRAME ANIMATIONS
   ═══════════════════════════════════════════ */

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes float-slow {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      33% {
        transform: translateY(-12px) rotate(1deg);
      }

      66% {
        transform: translateY(-6px) rotate(-1deg);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }

      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }

    @keyframes slide-up {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slide-down {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scale-in {
      0% {
        opacity: 0;
        transform: scale(0.85);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes scale-bounce {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }

      60% {
        transform: scale(1.08);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes gradient-shift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes rotate-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes border-dance {
      0% {
        border-color: rgba(255, 255, 255, 0.15);
      }

      50% {
        border-color: rgba(255, 255, 255, 0.35);
      }

      100% {
        border-color: rgba(255, 255, 255, 0.15);
      }
    }

    @keyframes glow-pulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(var(--glow-rgb), 0.2);
      }

      50% {
        box-shadow: 0 0 40px rgba(var(--glow-rgb), 0.5);
      }
    }

    @keyframes text-glow {

      0%,
      100% {
        text-shadow: 0 0 10px currentColor;
      }

      50% {
        text-shadow: 0 0 25px currentColor, 0 0 40px currentColor;
      }
    }

    @keyframes morph-blob {

      0%,
      100% {
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      }

      25% {
        border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
      }

      50% {
        border-radius: 50% 60% 30% 60% / 40% 70% 60% 30%;
      }

      75% {
        border-radius: 60% 30% 60% 40% / 70% 40% 50% 60%;
      }
    }

    @keyframes mosaic-tile {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 0.7;
      }
    }

    @keyframes stagger-in {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes ripple {
      0% {
        transform: scale(0.08);
        opacity: 0.22;
      }

      26% {
        opacity: 0.30;
      }

      100% {
        transform: scale(4.8);
        opacity: 0;
      }
    }

    @keyframes typewriter {
      from {
        width: 0;
      }

      to {
        width: 100%;
      }
    }

    @keyframes blink-cursor {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes scanline {
      0% {
        top: -10%;
      }

      100% {
        top: 110%;
      }
    }

    @keyframes particle-rise {
      0% {
        transform: translateY(100%) scale(0);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      80% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-100vh) scale(1);
        opacity: 0;
      }
    }

    @keyframes wave-flow {
      0% {
        transform: translateX(0) translateY(0);
      }

      50% {
        transform: translateX(-25%) translateY(-5%);
      }

      100% {
        transform: translateX(0) translateY(0);
      }
    }

    @keyframes iris-open {
      0% {
        clip-path: circle(0% at 50% 50%);
        opacity: 0;
      }

      100% {
        clip-path: circle(75% at 50% 50%);
        opacity: 1;
      }
    }

    @keyframes slide-right {
      0% {
        opacity: 0;
        transform: translateX(-30px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes counter-up {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shine-sweep {
      0% {
        left: -100%;
      }

      100% {
        left: 200%;
      }
    }

    @keyframes gold-shimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    @keyframes buttery-pop {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(0.92);
        filter: blur(8px);
      }

      55% {
        opacity: 1;
        transform: translateY(-4px) scale(1.025);
        filter: blur(0);
      }

      78% {
        transform: translateY(2px) scale(0.992);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes bubbly-breathe {

      0%,
      100% {
        transform: translateY(0) scale(1);
        border-radius: 20px;
      }

      35% {
        transform: translateY(-3px) scale(1.006);
        border-radius: 24px;
      }

      70% {
        transform: translateY(1px) scale(0.998);
        border-radius: 18px;
      }
    }

    @keyframes jelly-press {
      0% {
        transform: scale(1);
      }

      32% {
        transform: scale(0.965, 1.035);
      }

      62% {
        transform: scale(1.018, 0.982);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes cortex-jiggle-super {
      0% {
        transform: scale(1) rotate(0deg) translateY(0);
      }

      10% {
        transform: scale(0.88, 1.14) rotate(-3deg) translateY(-2px);
      }

      24% {
        transform: scale(1.12, 0.92) rotate(2.5deg) translateY(1px);
      }

      38% {
        transform: scale(0.94, 1.06) rotate(-1.8deg) translateY(-1px);
      }

      52% {
        transform: scale(1.06, 0.96) rotate(1.2deg) translateY(0.5px);
      }

      66% {
        transform: scale(0.97, 1.03) rotate(-0.7deg) translateY(0);
      }

      80% {
        transform: scale(1.02, 0.99) rotate(0.3deg);
      }

      100% {
        transform: scale(1) rotate(0deg) translateY(0);
      }
    }

    @keyframes cortex-spring-return {
      0% {
        transform: scale(0.92, 1.08) rotate(-1.5deg);
      }

      30% {
        transform: scale(1.06, 0.96) rotate(1deg);
      }

      55% {
        transform: scale(0.98, 1.02) rotate(-0.4deg);
      }

      80% {
        transform: scale(1.01, 0.99) rotate(0.1deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes cortex-button-tap-bloom {
      0% {
        opacity: 0.0;
        transform: scale(0.94);
        filter: blur(1px);
      }

      32% {
        opacity: 1;
        transform: scale(1.02);
        filter: blur(0);
      }

      64% {
        transform: scale(0.985);
      }

      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes soft-wobble {

      0%,
      100% {
        transform: rotate(0deg) translateY(0);
      }

      25% {
        transform: rotate(-0.8deg) translateY(-2px);
      }

      55% {
        transform: rotate(0.7deg) translateY(1px);
      }

      80% {
        transform: rotate(-0.3deg) translateY(-1px);
      }
    }

    @keyframes cortex-water-ripple-ambient {

      0%,
      100% {
        opacity: 0.14;
        transform: scale(0.985) rotate(0deg);
      }

      35% {
        opacity: 0.22;
        transform: scale(1.01) rotate(0.2deg);
      }

      70% {
        opacity: 0.16;
        transform: scale(1.024) rotate(-0.18deg);
      }
    }

    @keyframes liquid-sheen {
      0% {
        transform: translateX(-120%) skewX(-18deg);
        opacity: 0;
      }

      18% {
        opacity: 0.65;
      }

      46% {
        opacity: 0;
      }

      100% {
        transform: translateX(220%) skewX(-18deg);
        opacity: 0;
      }
    }

    @keyframes pill-jiggle {
      0% {
        transform: scale(1) rotate(0deg);
      }

      35% {
        transform: scale(1.08, 0.94) rotate(-1.2deg);
      }

      65% {
        transform: scale(0.98, 1.04) rotate(0.8deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes cortex-touch-flop {
      0% {
        transform: translate3d(0, 0, 0) scale3d(1, 1, 1);
      }

      30% {
        transform: translate3d(1px, -1px, 0) scale3d(1.03, 0.97, 1);
      }

      58% {
        transform: translate3d(-1px, 1px, 0) scale3d(0.985, 1.025, 1);
      }

      82% {
        transform: translate3d(0.5px, -0.5px, 0) scale3d(1.008, 0.995, 1);
      }

      100% {
        transform: translate3d(0, 0, 0) scale3d(1, 1, 1);
      }
    }

    @keyframes cortex-wallpaper-drift {

      0%,
      100% {
        transform: translate3d(var(--wallpaper-x, 0px), var(--wallpaper-y, 0px), 0) scale(1.07) rotate(0deg);
      }

      45% {
        transform: translate3d(calc(var(--wallpaper-x, 0px) * 1.4 + 10px), calc(var(--wallpaper-y, 0px) * 1.2 - 12px), 0) scale(1.105) rotate(0.7deg);
      }

      72% {
        transform: translate3d(calc(var(--wallpaper-x, 0px) * 0.7 - 7px), calc(var(--wallpaper-y, 0px) * 1.5 + 8px), 0) scale(1.085) rotate(-0.45deg);
      }
    }

    @keyframes cortex-wallpaper-bloom {

      0%,
      100% {
        opacity: 0.36;
        transform: translate(-50%, -50%) scale(0.82);
        filter: blur(22px);
      }

      50% {
        opacity: 0.62;
        transform: translate(-50%, -50%) scale(1.14);
        filter: blur(16px);
      }
    }

    @keyframes cortex-ripple-pop {
      0% {
        opacity: 0.05;
        transform: translate(-50%, -50%) scale(0.18);
      }

      26% {
        opacity: 0.22;
      }

      72% {
        opacity: 0.12;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(3.55);
      }
    }

    @keyframes cortex-live-float-a {

      0%,
      100% {
        transform: translate3d(var(--wallpaper-x, 0px), var(--wallpaper-y, 0px), 0) scale(0.96) rotate(0deg);
      }

      33% {
        transform: translate3d(calc(var(--wallpaper-x, 0px) * -0.7 + 22px), calc(var(--wallpaper-y, 0px) * 0.8 - 18px), 0) scale(1.04) rotate(7deg);
      }

      66% {
        transform: translate3d(calc(var(--wallpaper-x, 0px) * 0.9 - 18px), calc(var(--wallpaper-y, 0px) * -0.6 + 20px), 0) scale(1.01) rotate(-5deg);
      }
    }

    @keyframes cortex-live-float-b {

      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(var(--facet-rotate, 0deg)) scale(1);
      }

      45% {
        transform: translate3d(28px, -18px, 0) rotate(calc(var(--facet-rotate, 0deg) + 10deg)) scale(1.05);
      }

      72% {
        transform: translate3d(-18px, 16px, 0) rotate(calc(var(--facet-rotate, 0deg) - 6deg)) scale(0.98);
      }
    }

    @keyframes cortex-live-ribbon-drift {

      0%,
      100% {
        transform: translate3d(calc(var(--wallpaper-x, 0px) * 0.35), calc(var(--wallpaper-y, 0px) * 0.22), 0) rotate(var(--ribbon-rotate, 0deg)) scale(1);
      }

      38% {
        transform: translate3d(calc(var(--wallpaper-x, 0px) * -0.42 + 18px), calc(var(--wallpaper-y, 0px) * 0.40 - 20px), 0) rotate(calc(var(--ribbon-rotate, 0deg) + 5deg)) scale(1.04);
      }

      70% {
        transform: translate3d(calc(var(--wallpaper-x, 0px) * 0.20 - 22px), calc(var(--wallpaper-y, 0px) * -0.36 + 16px), 0) rotate(calc(var(--ribbon-rotate, 0deg) - 4deg)) scale(0.99);
      }
    }

    @keyframes cortex-live-glimmer {

      0%,
      100% {
        opacity: 0.18;
        filter: blur(18px) saturate(1.05);
      }

      45% {
        opacity: 0.36;
        filter: blur(12px) saturate(1.25);
      }

      72% {
        opacity: 0.24;
        filter: blur(22px) saturate(1.15);
      }
    }

    @keyframes cortex-device-jolt {

      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }

      14% {
        transform: translate3d(calc(var(--cortex-shake-x, 3px) * 0.65), calc(var(--cortex-shake-y, -2px) * 0.55), 0) rotate(calc(var(--cortex-shake-rot, 0.7deg) * 0.6));
      }

      30% {
        transform: translate3d(var(--cortex-shake-x, 3px), var(--cortex-shake-y, -2px), 0) rotate(var(--cortex-shake-rot, 0.7deg));
      }

      48% {
        transform: translate3d(var(--cortex-shake-x-neg, -2.5px), var(--cortex-shake-y-pos, 1.5px), 0) rotate(var(--cortex-shake-rot-neg, -0.55deg));
      }

      66% {
        transform: translate3d(calc(var(--cortex-shake-x-neg, -2.5px) * 0.45), calc(var(--cortex-shake-y-pos, 1.5px) * 0.55), 0) rotate(calc(var(--cortex-shake-rot-neg, -0.55deg) * 0.45));
      }

      82% {
        transform: translate3d(1px, -0.6px, 0) rotate(var(--cortex-shake-rest, 0.35deg));
      }
    }


    /* ═══════════════════════════════════════════
   THEME BUBBLE SLIDER
   ═══════════════════════════════════════════ */
    .cortex-theme-slider-track {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .cortex-theme-slider-track::-webkit-scrollbar {
      display: none;
    }

    .cortex-theme-slider-track>* {
      animation: buttery-pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .cortex-theme-slider-track>*:nth-child(1) {
      animation-delay: 0.03s;
    }

    .cortex-theme-slider-track>*:nth-child(2) {
      animation-delay: 0.07s;
    }

    .cortex-theme-slider-track>*:nth-child(3) {
      animation-delay: 0.11s;
    }

    .cortex-theme-slider-track>*:nth-child(4) {
      animation-delay: 0.15s;
    }

    .cortex-theme-slider-track>*:nth-child(5) {
      animation-delay: 0.19s;
    }

    .cortex-theme-slider-track>*:nth-child(6) {
      animation-delay: 0.23s;
    }

    .cortex-theme-bubble {
      transform-origin: center;
    }

    .cortex-theme-bubble:active {
      animation: cortex-jiggle-super 0.7s cubic-bezier(0.18, 1.14, 0.28, 1) !important;
    }

    .cortex-theme-bubble[data-active="true"]:active {
      animation: cortex-jiggle-super 0.7s cubic-bezier(0.18, 1.14, 0.28, 1) !important;
    }

    .cortex-theme-bubble[data-active="true"] {
      animation: bubbly-breathe 4s ease-in-out infinite;
    }

    @media (hover: hover) {
      .cortex-theme-bubble:hover {
        transform: scale(1.05) translateY(-2px) !important;
        border-color: rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35) !important;
      }

      .cortex-theme-bubble:hover .cortex-theme-bubble-orb {
        animation: soft-wobble 1.2s ease-in-out infinite !important;
      }
    }

    .cortex-theme-bubble-orb {
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }

    .cortex-theme-bubble:hover .cortex-theme-bubble-orb {
      transform: scale(1.12) rotate(-8deg) !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35) !important;
    }

    .cortex-theme-bubble[data-active="true"] .cortex-theme-bubble-orb {
      animation: float 3s ease-in-out infinite !important;
    }

    /* ═══════════════════════════════════════════
   GLASS UTILITIES
   ═══════════════════════════════════════════ */

    .glass-base {
      backdrop-filter: blur(var(--cortex-theme-blur, 24px)) saturate(var(--cortex-theme-saturate, 180%));
      -webkit-backdrop-filter: blur(var(--cortex-theme-blur, 24px)) saturate(var(--cortex-theme-saturate, 180%));
      background: var(--cortex-theme-glass, rgba(255, 255, 255, 0.08));
      border: 1px solid var(--cortex-theme-glass-border, rgba(255, 255, 255, 0.15));
      border-radius: var(--cortex-theme-radius, 20px);
    }

    .glass-heavy {
      backdrop-filter: blur(calc(var(--cortex-theme-blur, 24px) * 1.6)) saturate(calc(var(--cortex-theme-saturate, 180%) * 1.1));
      -webkit-backdrop-filter: blur(calc(var(--cortex-theme-blur, 24px) * 1.6)) saturate(calc(var(--cortex-theme-saturate, 180%) * 1.1));
      background: var(--cortex-theme-surface, rgba(255, 255, 255, 0.12));
      border: 1px solid var(--cortex-theme-glass-border, rgba(255, 255, 255, 0.2));
      border-radius: var(--cortex-theme-radius, 20px);
    }

    .glass-dark {

      right: -1px;
      bottom: -1px;
      left: -1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
      border-radius: inherit;
      pointer-events: none;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      padding: 1px;

    /* Stagger children animation */
    .stagger-children>* {
      animation: stagger-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .stagger-children>*:nth-child(1) {

    }

    .stagger-children>*:nth-child(2) {
      animation-delay: 0.1s;

    .stagger-children>*:nth-child(6) {

      animation-delay: 0.45s;

    .stagger-children>*:nth-child(10) {

    }

    /* Bounce easing */
    .bounce-in {
      animation: scale-bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    /* Smooth page transitions */
    .page-enter {
      animation: slide-up 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;

        transform: translate3d(0, 0, 0) scale(1);

    @keyframes cortex-page-enter-back {

    @keyframes cortex-browser-item-enter {

      transform-origin: top center;

      display: none;

      list-style: none;

      overflow: hidden;

        filter: saturate(1.18) brightness(1.08);

    /* iOS Safari auto-zooms any input/textarea with font-size < 16px.
   Force 16px minimum to prevent layout-disrupting zoom on focus. */
    .cortex-library-root textarea,
    .cortex-library-root input[type="text"],
    .cortex-library-root input[type="search"],
    .cortex-library-root input[type="password"],
    .cortex-library-root input[type="email"],

      font-size: 16px !important;
    }

    .cortex-page-glyph {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 16px;
      overflow: hidden;
      pointer-events: none;
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);

    .cortex-page-glyph svg {
      width: 100%;
      height: 100%;
      display: block;
      animation: cortex-page-glyph-float 7.2s ease-in-out infinite;
      transform-origin: center;
    }

    .cortex-page-glyph[data-variant="1"] svg {
      animation-duration: 8.2s;
      animation-direction: reverse;
    }

    .cortex-page-glyph[data-variant="2"] svg {
      animation-duration: 6.4s;
    }

    .cortex-page-glyph[data-variant="3"] svg {
      animation-duration: 9.3s;
      animation-direction: reverse;
    }

    .cortex-page-glyph[data-variant="4"] svg {
      animation-duration: 7.8s;
    }

    .cortex-page-glyph[data-variant="5"] svg {
      animation-duration: 6.9s;
      animation-direction: reverse;
    }

    .cortex-page-glyph[data-variant="6"] svg {
      animation-duration: 8.8s;
    }

    .cortex-page-glyph[data-variant="7"] svg {
      animation-duration: 7.4s;
      animation-direction: reverse;
    }

    .cortex-page-glyph path,
    .cortex-page-glyph rect,
    .cortex-page-glyph line,

      flex-shrink: 0;
      line-height: 0;

      overflow: visible;
      filter: drop-shadow(0 4px 14px rgba(104, 78, 255, 0.18));
    }

    .cortex-button-icon-shell {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;

    @keyframes cortex-page-glyph-float {

      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);

        transform: translate3d(0, -1px, 0) rotate(2deg) scale(1.03);
      }
    }

    @keyframes cortex-atom-sheen {
      0% {
        transform: translate3d(-18%, 0, 0) rotate(0.001deg);
      }

      100% {
        transform: translate3d(18%, 0, 0) rotate(0.001deg);
      }

      0%,
      100% {

    .cortex-motion-orb {
      animation: soft-wobble 12s ease-in-out infinite, float 10s ease-in-out infinite;
    }

      animation: pill-jiggle 10s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }

      .cortex-motion-page>*,
      .cortex-motion-card,
      .cortex-motion-card::after,
      .cortex-motion-press:active,
      .cortex-motion-orb,
      .cortex-motion-pill {
        animation: none !important;
      }

    /* Interactive wallpaper layer */
    .cortex-wallpaper-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      background: #070718;
      transition: filter 420ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .cortex-library-root[data-theme-id="monochrome"] .cortex-wallpaper-layer {
      filter: grayscale(1) brightness(0.65) contrast(1.1);
    }

    .cortex-library-root[data-theme-id="gold"] .cortex-wallpaper-layer {
      filter: sepia(0.85) hue-rotate(-15deg) brightness(0.7) contrast(1.15) saturate(1.4);
    }

    .cortex-library-root[data-theme-id="bloom"] .cortex-wallpaper-layer {
      filter: hue-rotate(145deg) saturate(1.35) brightness(0.75);
    }

    .cortex-library-root[data-theme-id="neon"] .cortex-wallpaper-layer {
      filter: hue-rotate(240deg) saturate(1.8) brightness(0.7) contrast(1.2);
    }

    .cortex-library-root[data-theme-id="aurora"] .cortex-wallpaper-layer {
      filter: hue-rotate(60deg) saturate(1.2) brightness(0.8);
    }

    .cortex-wallpaper-layer[data-exhibition="false"] {
      opacity: 0.64;
    }

    .cortex-wallpaper-layer[data-exhibition="true"] {
      opacity: 1;
    }

    .cortex-wallpaper-performance-field {
      position: absolute;
      inset: -12%;
      opacity: 0.98;
